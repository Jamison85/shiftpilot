<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset ShiftPilot Today</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f6f1e8;color:#123a50;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:22px}.card{width:min(420px,100%);border:1px solid #d9d2c3;border-radius:24px;background:#fff;padding:24px;box-shadow:0 18px 50px rgba(18,58,80,.12)}span{display:block;color:#0f766e;font-size:11px;font-weight:900;letter-spacing:.14em;text-transform:uppercase}h1{margin:8px 0 10px;font-size:30px;line-height:1;letter-spacing:-.05em}p{color:#65727a;line-height:1.5}button,a{display:flex;align-items:center;justify-content:center;width:100%;min-height:52px;border:0;border-radius:16px;font-weight:900;font-size:15px;text-decoration:none}button{margin-top:18px;background:#0f766e;color:white}a{margin-top:10px;background:#eef6f4;color:#0f766e}.note{margin-top:14px;font-size:12px;color:#8a6413;background:#fff8df;border-radius:14px;padding:12px}
  </style>
</head>
<body>
  <main class="card">
    <span>ShiftPilot rescue page</span>
    <h1>Reset today's workspace</h1>
    <p>This clears today's checkmarks, skipped tasks, interruptions, handoff notes, and custom tasks. It keeps your History and learned task times.</p>
    <button id="reset">Reset today</button>
    <a href="/">Back to ShiftPilot</a>
    <div class="note" id="status">Use this when the installed app is showing an older cached version.</div>
  </main>
  <script>
    const STORAGE_KEY='shiftpilot:data:v1';
    const SHIFT_ORDER=['morning','mid','night'];
    const SHIFT_LABELS={morning:'Morning',mid:'Mid',night:'Night'};
    const WALK_ITEMS=[['appearance','Store appearance'],['restrooms','Restrooms'],['cooler','Cooler & freezer'],['trash','Trash'],['coffee','Coffee & fountain area'],['cups','Cups filled','coffee'],['lids','Lids filled','coffee'],['straws','Straws filled','coffee'],['bibs','BIBs'],['bibs-check','Check bag-in-box supplies','bibs'],['bibs-replace','Replace low or empty BIBs','bibs'],['bibs-order','Flag flavors needing an order','bibs'],['warmers','Food warmers'],['gaps','Stock gaps'],['safety','Safety issues'],['handoff','Handoff items']];
    const DAY_TEMPLATES={
      0:{name:'Sunday Outs and Weekend Recovery',truckDay:false,tasks:[['Weekend recovery','morning',30,'high'],['Cooler and freezer recovery','mid',25,'normal'],['Complete outs — may be done during day or night, due before close','night',60,'urgent']]},
      1:{name:'Monday Store Order and Office Day',truckDay:false,tasks:[['Submit store order by 2:00 PM','morning',45,'urgent'],['Change order and receiving','morning',30,'high'],['MAP and signage review','morning',25,'normal']]},
      2:{name:'Tuesday Cigarette Audit and Truck Prep',truckDay:false,lorettaHandles:['bookwork','smart-counts'],tasks:[['Cigarette Audits','morning',120,'urgent'],['Work as much backstock to the sales floor as possible','mid',60,'high'],['Organize the backstock room','mid',30,'high'],['Prepare for Wednesday truck — move carts and dollies by the door and clear the back-room walkway','night',20,'high']]},
      3:{name:'Wednesday Truck Day',truckDay:true,tasks:[['Truck unload and put-away','morning',90,'urgent'],['Truck backstock recovery','mid',45,'high']]},
      4:{name:'Thursday Recovery Day',truckDay:false,tasks:[['Post-truck backstock recovery','morning',35,'high'],['Shelf tags and signage follow-up','mid',25,'normal']]},
      5:{name:'Friday Weekend Readiness',truckDay:false,tasks:[['Weekend readiness walk','morning',25,'high'],['Cooler and fountain readiness','mid',25,'normal']]},
      6:{name:'Saturday High-Traffic Recovery',truckDay:false,tasks:[['Weekend recovery','morning',30,'high'],['High-traffic stock fill','mid',30,'high']]}
    };
    function dateKey(){const d=new Date();const local=new Date(d.getTime()-d.getTimezoneOffset()*60000);return local.toISOString().slice(0,10)}
    function currentShift(){const hour=new Date().getHours();return hour<11?'morning':hour<17?'mid':'night'}
    function defaultWalkItems(){return WALK_ITEMS.map(([id,label,parent])=>({id,label,parent:parent||null,checked:false}))}
    function makeTask(title,shift,options={}){return {id:options.id||`${Date.now()}-${Math.random().toString(36).slice(2,8)}`,title:String(title).trim(),shift,minutes:options.minutes??15,priority:options.priority||'normal',completed:false,completedAt:null,actualMinutes:null,milestone:options.milestone||false,excluded:options.excluded||false,owner:options.owner||'Me',type:options.type||'custom',order:options.order??99,walkItems:options.walkItems||null,handoff:false,createdAt:new Date().toISOString(),estimateSource:options.estimateSource||'smart',skipped:false,templateName:options.templateName||null,templateDate:options.templateDate||null}}
    function seedTasks(){return [makeTask('Bookwork','morning',{id:'bookwork',type:'bookwork',minutes:45,priority:'required',milestone:true,order:0}),makeTask('Smart Counts','morning',{id:'smart-counts',type:'smart-counts',minutes:30,priority:'required',milestone:true,order:1}),...SHIFT_ORDER.map(shift=>makeTask(`${SHIFT_LABELS[shift]} Daily Walk`,shift,{id:`${shift}-walk`,type:'walk',minutes:20,priority:'required',order:shift==='morning'?2:0,walkItems:defaultWalkItems()}))]}
    function defaultData(savedDate){const key=savedDate||dateKey();const day=new Date(`${key}T12:00:00`).getDay();const template=DAY_TEMPLATES[day]||DAY_TEMPLATES[1];const templateTasks=template.tasks.map(([title,shift,minutes,priority],index)=>makeTask(title,shift,{id:`template-${key}-${index}`,type:'template',minutes,priority,order:10+index,templateName:template.name,templateDate:key}));let tasks=[...seedTasks(),...templateTasks];const lorettaHandles=new Set([...(template.truckDay?['bookwork']:[]),...(template.lorettaHandles||[])]);if(lorettaHandles.size){tasks=tasks.map(task=>lorettaHandles.has(task.id)?{...task,excluded:true,owner:'Loretta'}:task)}return {date:key,truckDay:template.truckDay,templateName:template.name,activeShift:currentShift(),shiftHours:{morning:8,mid:8,night:8},tasks,handoffNotes:{morning:'',mid:'',night:''},extraCompleted:[],history:[],celebrated:{},interruptions:[]}}
    document.getElementById('reset').addEventListener('click',()=>{
      if(!confirm("Reset today's workspace? History and learned times will stay."))return;
      const current=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
      const fresh=defaultData(current.date||dateKey());
      localStorage.setItem(STORAGE_KEY,JSON.stringify({...fresh,history:current.history||[],activeShift:current.activeShift||fresh.activeShift}));
      document.getElementById('status').textContent='Today reset. Sending you back to ShiftPilot...';
      setTimeout(()=>location.href='/',500);
    });
  </script>
</body>
</html>
